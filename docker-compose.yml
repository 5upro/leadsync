services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: leadsync-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    networks:
      - leadsync

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: leadsync-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - leadsync

networks:
  leadsync:
    driver: bridge
